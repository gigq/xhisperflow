    <rect x="570" y="344" width="34" height="336" rx="17" fill="url(#wave)"/>
    <rect x="624" y="408" width="34" height="208" rx="17" fill="url(#wave)"/>
    <rect x="678" y="366" width="34" height="292" rx="17" fill="url(#wave)"/>
