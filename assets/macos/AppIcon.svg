    </filter>
  </defs>

  <rect x="128" y="104" width="768" height="816" rx="188" fill="url(#tile)" filter="url(#shadow)"/>
  <rect x="176" y="152" width="672" height="720" rx="148" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-opacity="0.72"/>

  <g filter="url(#barShadow)">
